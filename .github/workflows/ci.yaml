name: DevSecOps Pipeline

on:
  push:
    branches: [ master ]

# ✅ Optional (future-proof for Node 24)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4   # ✅ updated

      - name: Setup Node.js
        uses: actions/setup-node@v4   # ✅ updated
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --prefix ./app

      - name: Run tests
        run: npm test --prefix ./app

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4   # ✅ updated

      - name: Login to DockerHub
        uses: docker/login-action@v3   # ✅ updated
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/devsecops-app:${{ github.sha }} ./app
          docker tag ${{ secrets.DOCKER_USERNAME }}/devsecops-app:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/devsecops-app:latest

      - name: Trivy scan
        uses: aquasecurity/trivy-action@v0.19.0  # ✅ updated to stable version
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/devsecops-app:${{ github.sha }}

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/devsecops-app:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/devsecops-app:latest

      - name: SonarQube Scan
        run: |
          npm install -g sonar-scanner
          sonar-scanner \
            -Dproject.settings=app/sonar-project.properties \
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
            -Dsonar.login=${{ secrets.SONAR_TOKEN }}

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4   # ✅ updated

      - name: Setup Kind Cluster
        uses: helm/kind-action@v1

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4   # ✅ updated
        with:
          version: latest

      - name: Deploy to cluster
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml

      - name: Verify deployment
        run: kubectl get pods
